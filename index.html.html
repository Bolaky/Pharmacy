<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صيدلية نفقة الدولة - توفر الأدوية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0a6e5c;
    --primary-light: #0d8f77;
    --primary-dark: #075044;
    --accent: #e8f5f2;
    --available: #0a6e5c;
    --unavailable: #c0392b;
    --unlisted: #2980b9;
    --bg: #f4f7f6;
    --card: #ffffff;
    --text: #1a2e2a;
    --text-muted: #6b8680;
    --border: #d4e6e1;
    --shadow: 0 2px 16px rgba(10,110,92,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
    padding: 28px 20px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -40px; left: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -60px; right: -30px;
    width: 250px; height: 250px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }

  .header-icon {
    font-size: 40px;
    margin-bottom: 8px;
    display: block;
  }

  .header h1 {
    color: #fff;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .header p {
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    font-weight: 300;
  }

  /* Search */
  .search-container {
    padding: 0 16px;
    margin-top: -22px;
    position: relative;
    z-index: 10;
  }

  .search-box {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(10,110,92,0.15);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .search-icon {
    color: var(--primary);
    font-size: 18px;
    flex-shrink: 0;
  }

  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    color: var(--text);
    background: transparent;
  }

  .search-box input::placeholder {
    color: #aab8b5;
  }

  .clear-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #aab8b5;
    font-size: 18px;
    padding: 2px;
    display: none;
  }

  /* Filter tabs */
  .filters {
    padding: 16px 16px 0;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: #fff;
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  /* Stats bar */
  .stats-bar {
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Results */
  .results-count {
    padding: 0 16px 8px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .cards-container {
    padding: 0 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Card */
  .drug-card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    box-shadow: var(--shadow);
    border-right: 4px solid transparent;
    transition: transform 0.15s, box-shadow 0.15s;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .drug-card:active { transform: scale(0.98); }

  .drug-card.available { border-right-color: var(--available); }
  .drug-card.unavailable { border-right-color: var(--unavailable); }
  .drug-card.unlisted { border-right-color: var(--unlisted); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
    gap: 10px;
  }

  .drug-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
    flex: 1;
  }

  .status-badge {
    flex-shrink: 0;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  .status-badge.available {
    background: #e8f5f0;
    color: var(--available);
  }

  .status-badge.unavailable {
    background: #fdecea;
    color: var(--unavailable);
  }

  .status-badge.unlisted {
    background: #e8f4fd;
    color: var(--unlisted);
  }

  .card-details {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }

  .detail-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--accent);
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px;
    color: var(--primary-dark);
  }

  .trade-names {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }

  .trade-names-label {
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    display: block;
  }

  .trade-name-tag {
    display: inline-block;
    background: #f0f0f0;
    padding: 2px 8px;
    border-radius: 6px;
    margin: 2px 2px;
    font-size: 11px;
    color: #444;
  }

  .trade-name-tag.highlight {
    background: #fff3cd;
    color: #856404;
  }

  .card-footer {
    margin-top: 8px;
    font-size: 11px;
    color: #aab8b5;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state .emoji { font-size: 48px; margin-bottom: 16px; display: block; }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }

  .retry-btn {
    margin-top: 12px;
    padding: 10px 24px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    cursor: pointer;
  }

  /* Footer note */
  .footer-note {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    z-index: 100;
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-icon">💊</span>
  <h1>صيدلية نفقة الدولة</h1>
  <p>استعلم عن توفر دوائك قبل الزيارة</p>
</div>

<div class="search-container">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="ابحث بالاسم التجاري أو المادة الفعالة..." autocomplete="off">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">الكل</button>
  <button class="filter-btn" onclick="setFilter('متوفر', this)">✅ متوفر</button>
  <button class="filter-btn" onclick="setFilter('غير متوفر', this)">❌ غير متوفر</button>
</div>

<div class="stats-bar" id="statsBar" style="display:none">
  <div class="stat"><div class="stat-dot" style="background:var(--available)"></div><span id="availableCount">0</span> متوفر</div>
  <div class="stat"><div class="stat-dot" style="background:var(--unavailable)"></div><span id="unavailableCount">0</span> غير متوفر</div>
</div>

<div class="results-count" id="resultsCount"></div>

<div class="cards-container" id="cardsContainer">
  <div class="loading">
    <div class="spinner"></div>
    <p>جاري تحميل البيانات...</p>
  </div>
</div>

<div class="footer-note">
  📋 البيانات للاستئناس فقط — تواصل مع الصيدلية للتأكيد
</div>

<script>
  // ===== إعدادات =====
  const SHEET_ID = '1In11L8-coU-1-ddsGDIVmz6VrymRg7gD';
  const SHEET_NAME = 'status of drugs';
  const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

  let allDrugs = [];
  let currentFilter = 'all';
  let searchQuery = '';

  // ===== تحميل البيانات =====
  async function loadData() {
    try {
      const res = await fetch(API_URL);
      const text = await res.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      const rows = json.table.rows;

      allDrugs = rows.map(row => ({
        activeName: getCellValue(row, 0),
        concentration: getCellValue(row, 1),
        form: getCellValue(row, 2),
        tradeNames: getCellValue(row, 3),
        availability: getCellValue(row, 4),
        lastUpdate: getCellValue(row, 5),
      })).filter(d => d.activeName);

      updateStats();
      renderCards();
    } catch (e) {
      document.getElementById('cardsContainer').innerHTML = `
        <div class="error-state">
          <span style="font-size:40px">⚠️</span>
          <p style="margin-top:12px">تعذر تحميل البيانات<br>تأكد من اتصالك بالإنترنت</p>
          <button class="retry-btn" onclick="loadData()">إعادة المحاولة</button>
        </div>`;
    }
  }

  function getCellValue(row, index) {
    try { return row.c[index]?.v?.toString().trim() || ''; }
    catch { return ''; }
  }

  // ===== إحصائيات =====
  function updateStats() {
    const available = allDrugs.filter(d => d.availability === 'متوفر').length;
    const unavailable = allDrugs.filter(d => d.availability === 'غير متوفر').length;
    document.getElementById('availableCount').textContent = available;
    document.getElementById('unavailableCount').textContent = unavailable;
    document.getElementById('statsBar').style.display = 'flex';
  }

  // ===== تصفية وبحث =====
  function getFilteredDrugs() {
    let drugs = [...allDrugs];

    if (currentFilter !== 'all') {
      drugs = drugs.filter(d => d.availability === currentFilter);
    }

    if (searchQuery.trim()) {
      const q = searchQuery.trim().toLowerCase();
      drugs = drugs.filter(d =>
        d.activeName.toLowerCase().includes(q) ||
        d.tradeNames.toLowerCase().includes(q) ||
        d.form.toLowerCase().includes(q)
      );
    }

    return drugs;
  }

  // ===== عرض البطاقات =====
  function renderCards() {
    const drugs = getFilteredDrugs();
    const container = document.getElementById('cardsContainer');
    const resultsCount = document.getElementById('resultsCount');

    if (drugs.length === 0) {
      resultsCount.textContent = '';
      container.innerHTML = `
        <div class="empty-state">
          <span class="emoji">🔍</span>
          <h3>لا توجد نتائج</h3>
          <p>جرب البحث بالاسم التجاري<br>أو المادة الفعالة باللغتين</p>
        </div>`;
      return;
    }

    resultsCount.textContent = `${drugs.length} نتيجة`;
    container.innerHTML = drugs.map(drug => buildCard(drug)).join('');
  }

  function buildCard(drug) {
    const statusClass = drug.availability === 'متوفر' ? 'available' :
                        drug.availability === 'غير متوفر' ? 'unavailable' : 'unlisted';

    const statusIcon = drug.availability === 'متوفر' ? '✅' :
                       drug.availability === 'غير متوفر' ? '❌' : '🔵';

    const statusText = drug.availability || 'غير محدد';

    // معالجة الأسماء التجارية
    const tradeNamesHtml = drug.tradeNames
      ? drug.tradeNames.split(',')
          .map(n => n.trim()).filter(n => n)
          .map(n => {
            const isHighlight = searchQuery && n.toLowerCase().includes(searchQuery.toLowerCase());
            return `<span class="trade-name-tag ${isHighlight ? 'highlight' : ''}">${n}</span>`;
          }).join('')
      : '<span style="color:#aaa">—</span>';

    // آخر تحديث
    const lastUpdateHtml = drug.lastUpdate
      ? `<div class="card-footer">🕐 آخر تحديث: ${drug.lastUpdate}</div>`
      : '';

    return `
      <div class="drug-card ${statusClass}">
        <div class="card-header">
          <div class="drug-name">${drug.activeName}</div>
          <div class="status-badge ${statusClass}">${statusIcon} ${statusText}</div>
        </div>
        <div class="card-details">
          ${drug.concentration ? `<div class="detail-chip">💉 ${drug.concentration}</div>` : ''}
          ${drug.form ? `<div class="detail-chip">💊 ${drug.form}</div>` : ''}
        </div>
        ${drug.tradeNames ? `
        <div class="trade-names">
          <span class="trade-names-label">الأسماء التجارية:</span>
          ${tradeNamesHtml}
        </div>` : ''}
        ${lastUpdateHtml}
      </div>`;
  }

  // ===== أحداث البحث =====
  document.getElementById('searchInput').addEventListener('input', function() {
    searchQuery = this.value;
    document.getElementById('clearBtn').style.display = searchQuery ? 'block' : 'none';
    renderCards();
  });

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    searchQuery = '';
    document.getElementById('clearBtn').style.display = 'none';
    renderCards();
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards();
  }

  // ===== تشغيل =====
  loadData();
</script>
</body>
</html>

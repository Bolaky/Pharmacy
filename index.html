<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صيدلية نفقة الدولة - توفر الأدوية</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-B92LN3C7HG"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-B92LN3C7HG');
</script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0a6e5c;
    --primary-light: #0d8f77;
    --primary-dark: #075044;
    --accent: #e8f5f2;
    --available: #0a6e5c;
    --unavailable: #c0392b;
    --limited: #d68910;
    --unlisted: #2980b9;
    --bg: #f4f7f6;
    --card: #ffffff;
    --text: #1a2e2a;
    --text-muted: #7f8c8d;
    --shadow: 0 4px 15px rgba(0,0,0,0.08);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
  body { background-color: var(--bg); color: var(--text); line-height: 1.6; padding-bottom: 40px; }

  header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 25px 20px 60px; text-align: center; position: relative; }
  header h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
  header p { font-size: 14px; opacity: 0.9; }

  /* رسالة الدعاء والترحيب الأصلية */
  .welcome-msg { font-size: 14px; margin-top: 10px; font-style: italic; color: #e8f5f2; }

  .ticker-wrap { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.2); height: 35px; overflow: hidden; white-space: nowrap; display: flex; align-items: center; }
  .ticker { display: inline-block; animation: ticker 30s linear infinite; padding-right: 100%; color: #fff; font-size: 13px; font-weight: 500; }
  @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
  .ticker span { margin: 0 25px; display: inline-flex; align-items: center; }
  .ticker span::before { content: '•'; margin-left: 8px; color: #4ade80; }

  .container { max-width: 600px; margin: -40px auto 0; padding: 0 15px; position: relative; z-index: 10; }

  .search-box { background: var(--card); border-radius: var(--radius); padding: 8px; display: flex; align-items: center; box-shadow: var(--shadow); margin-bottom: 10px; }
  .search-box input { flex: 1; border: none; padding: 12px 15px; font-size: 16px; outline: none; background: transparent; }
  .clear-btn { background: #eee; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: none; margin-left: 5px; color: #666; font-weight: bold; }

  /* ميزة "هل تقصد" */
  #didYouMean { display: none; background: #fff3cd; color: #856404; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; border: 1px solid #ffeeba; cursor: pointer; }

  .stats-info { background: #fff; border-radius: var(--radius); padding: 12px 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; border-right: 4px solid var(--primary); box-shadow: var(--shadow); }
  .stats-info span b { color: var(--primary); font-size: 16px; }

  .drugs-list { display: grid; gap: 15px; }

  .drug-card { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); transition: transform 0.2s; border: 1px solid #edf2f1; position: relative; cursor: pointer; }
  .drug-card:active { transform: scale(0.98); }

  .status-strip { height: 5px; width: 100%; }
  .status-strip.available { background-color: var(--available); }
  .status-strip.unavailable { background-color: var(--unavailable); }
  .status-strip.limited { background-color: var(--limited); }
  .status-strip.unlisted { background-color: var(--unlisted); }

  .card-content { padding: 15px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .drug-name { font-size: 18px; font-weight: 800; color: var(--primary-dark); }
  .drug-form { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; color: white; }

  .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #eee; }
  .detail-item { font-size: 12px; }
  .detail-label { color: var(--text-muted); display: block; margin-bottom: 2px; }
  .detail-val { font-weight: 600; color: #2c3e50; }

  .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
  .btn-action { padding: 10px; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .btn-alt { background: var(--accent); color: var(--primary); }
  .btn-info { background: #f8f9fa; color: #555; }
  .btn-video { grid-column: span 2; background: #fff5f5; color: #e74c3c; border: 1px solid #ffdada; }

  .pin-btn { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9); border: none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 5; transition: 0.3s; }
  .pin-btn.active { background: var(--primary); color: white; transform: rotate(45deg); }

  /* المودال الأصلي */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
  .modal { background: white; width: 100%; max-width: 500px; border-radius: 20px; overflow: hidden; max-height: 90vh; display: flex; flex-direction: column; }
  .modal-header { padding: 20px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; }
  .modal-body { padding: 20px; overflow-y: auto; }
  .close-modal { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

  .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>دليل أدوية نفقة الدولة</h1>
  <p>تابع توفر علاجك والبدائل المتاحة لحظة بلحظة</p>
  <div class="welcome-msg">"اللهم رب الناس، أذهب الباس، اشف أنت الشافي، لا شفاء إلا شفاؤك"</div>
  <div class="ticker-wrap">
    <div class="ticker" id="ticker">جاري تحميل آخر التوريدات...</div>
  </div>
</header>

<div class="container">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="ابحث باسم الدواء أو المادة الفعالة...">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>

  <div id="didYouMean"></div>

  <div class="stats-info">
    <span>إجمالي الأدوية: <b id="totalCount">...</b></span>
    <span>آخر تحديث: <b id="lastUpdate">...</b></span>
  </div>

  <div id="loader" class="loader"></div>
  <div id="drugsList" class="drugs-list"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modalTitle">التفاصيل</h3>
      <button class="close-modal" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
  // ⚠️ ضع رابط الـ Web App الخاص بك هنا
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwx5mDI7gZb4TN7K3NnMfCwntiJZreqob6f9rmVKVAGXpoEzyXB8qjA_ZfmOj6pGcil/exec'; 

  let allDrugs = [];
  let pinnedDrugs = JSON.parse(localStorage.getItem('pinnedDrugs') || '[]');
  let searchQuery = '';
  let searchTimer;

  async function fetchDrugs() {
    try {
      const response = await fetch(SCRIPT_URL);
      const data = await response.json();
      allDrugs = data.slice(1).map(row => ({
        activeName: row[0], concentration: row[1], pharmaceuticalForm: row[2],
        status: row[3], alternativesTherapeutic: row[4], alternativesGeneral: row[5],
        tips: row[6], warnings: row[7], videoUrl: row[8], lastUpdate: row[9], isNew: row[10] === 'نعم'
      }));
      document.getElementById('loader').style.display = 'none';
      document.getElementById('totalCount').innerText = allDrugs.length;
      document.getElementById('lastUpdate').innerText = allDrugs[0]?.lastUpdate || '-';
      updateTicker();
      renderCards();
    } catch (e) { console.error(e); }
  }

  function updateTicker() {
    const news = allDrugs.filter(d => d.isNew).slice(0, 5);
    document.getElementById('ticker').innerHTML = news.length > 0 ? 
      news.map(d => `<span>توفر حديثاً: ${d.activeName}</span>`).join('') :
      '<span>مرحباً بكم في صيدلية نفقة الدولة</span>';
  }

  function renderCards() {
    const list = document.getElementById('drugsList');
    const filtered = getFilteredDrugs();
    
    // ميزة "هل تقصد"
    handleSmartSearch(searchQuery.toLowerCase().trim(), filtered);

    list.innerHTML = filtered.map((drug) => {
      const isPinned = pinnedDrugs.includes(drug.activeName + drug.concentration);
      const realIndex = allDrugs.indexOf(drug);
      return `
        <div class="drug-card" onclick="openDetail(${realIndex}, 'click')">
          <div class="status-strip ${getStatusClass(drug.status)}"></div>
          <button class="pin-btn ${isPinned ? 'active' : ''}" onclick="togglePin(event, '${drug.activeName + drug.concentration}')">📌</button>
          <div class="card-content">
            <div class="card-header">
              <div class="drug-name">${drug.activeName}</div>
              <span class="status-badge" style="background:${getStatusColor(drug.status)}">${drug.status}</span>
            </div>
            <div class="drug-form">${drug.pharmaceuticalForm} | ${drug.concentration}</div>
            <div class="action-btns">
              <button class="btn-action btn-alt" onclick="openDetailSection(event, ${realIndex}, 'alternatives', 'alts_therapeutic_click')">🔍 البدائل</button>
              <button class="btn-action btn-info" onclick="openDetailSection(event, ${realIndex}, 'tips', 'tips_click')">💡 نصائح</button>
              <button class="btn-action btn-video" onclick="openDetailSection(event, ${realIndex}, 'video', 'video_click')">📺 فيديو</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  // ميزة "هل تقصد" باستخدام خوارزمية Levenshtein
  function handleSmartSearch(query, filtered) {
    const dym = document.getElementById('didYouMean');
    dym.style.display = 'none';
    if (query.length > 2 && filtered.length === 0) {
      let bestMatch = null;
      let minDistance = 3;
      allDrugs.forEach(d => {
        let dist = levenshtein(query, d.activeName.toLowerCase());
        if (dist < minDistance) { minDistance = dist; bestMatch = d.activeName; }
      });
      if (bestMatch) {
        dym.innerHTML = `هل تقصد: <b>${bestMatch}</b>؟`;
        dym.style.display = 'block';
        dym.onclick = () => { document.getElementById('searchInput').value = bestMatch; searchQuery = bestMatch; renderCards(); };
      }
    }
  }

  function levenshtein(a, b) {
    const tmp = [];
    for (let i = 0; i <= a.length; i++) tmp[i] = [i];
    for (let j = 0; j <= b.length; j++) tmp[0][j] = j;
    for (let i = 1; i <= a.length; i++) {
      for (let j = 1; j <= b.length; j++) {
        tmp[i][j] = Math.min(tmp[i-1][j]+1, tmp[i][j-1]+1, tmp[i-1][j-1] + (a[i-1] === b[j-1] ? 0 : 1));
      }
    }
    return tmp[a.length][b.length];
  }

  // تسجيل الإحصائيات (الإصلاح المطلوب)
  function logStats(name, conc, type) {
    const url = `${SCRIPT_URL}?name=${encodeURIComponent(name)}&conc=${encodeURIComponent(conc)}&type=${encodeURIComponent(type)}`;
    fetch(url, { mode: 'no-cors' });
  }

  function openDetailSection(event, index, section, statType) {
    event.stopPropagation();
    const drug = allDrugs[index];
    logStats(drug.activeName, drug.concentration, statType);
    openDetail(index);
  }

  function openDetail(index, type = null) {
    const drug = allDrugs[index];
    if (type) logStats(drug.activeName, drug.concentration, type);
    document.getElementById('modalTitle').innerText = drug.activeName;
    document.getElementById('modalBody').innerHTML = `
      <p><b>الحالة:</b> ${drug.status}</p>
      <p><b>البدائل:</b> ${drug.alternativesTherapeutic}</p>
      <p><b>نصائح:</b> ${drug.tips || 'قريباً'}</p>
    `;
    document.getElementById('modalOverlay').style.display = 'flex';
  }

  function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

  function getFilteredDrugs() {
    const query = searchQuery.toLowerCase().trim();
    return allDrugs.filter(d => d.activeName.toLowerCase().includes(query) || d.alternativesTherapeutic.toLowerCase().includes(query));
  }

  function getStatusClass(s) { return s.includes('متوفر') ? 'available' : 'unavailable'; }
  function getStatusColor(s) { return s.includes('متوفر') ? '#0a6e5c' : '#c0392b'; }

  function togglePin(event, id) {
    event.stopPropagation();
    const idx = pinnedDrugs.indexOf(id);
    if (idx > -1) pinnedDrugs.splice(idx, 1); else pinnedDrugs.push(id);
    localStorage.setItem('pinnedDrugs', JSON.stringify(pinnedDrugs));
    renderCards();
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    searchQuery = '';
    document.getElementById('didYouMean').style.display = 'none';
    renderCards();
  }

  document.getElementById('searchInput').addEventListener('input', function() {
    searchQuery = this.value;
    renderCards();
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      logStats(searchQuery || "فراغ", "بحث", "search");
    }, 2000);
  });

  window.onload = fetchDrugs;
</script>
</body>
</html>
